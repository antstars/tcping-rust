name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 阵营 (使用 cross 解决底层 C 库依赖)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
            bin_name: tcping
            asset_name: tcping-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
            bin_name: tcping
            asset_name: tcping-linux-arm64
          
          # Windows 阵营 (使用原生 cargo 即可支持交叉编译)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            bin_name: tcping.exe
            asset_name: tcping-windows-amd64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            use_cross: false
            bin_name: tcping.exe
            asset_name: tcping-windows-arm64.exe
          
          # macOS 阵营 (使用原生 cargo 即可支持)
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
            bin_name: tcping
            asset_name: tcping-macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
            bin_name: tcping
            asset_name: tcping-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 为什么：taiki-e 的预编译包缓存可以直接秒级安装 cross，避免 cargo install 动辄几分钟的编译耗时。
      - name: Install cross (Linux only)
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build with cross
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        # 为什么：统一重命名输出文件，让下载页面的文件名具备完全的自解释性（平台 + 架构）。
        run: |
          cd target/${{ matrix.target }}/release
          mv ${{ matrix.bin_name }} ${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.asset_name }}