name: Release Build

on:
  push:
    tags:
      - 'v*' # 为什么：只在推送类似 v1.0.0 的版本标签时触发正式发布，避免普通提交浪费云端编译资源。
  workflow_dispatch: # 为什么：保留手动触发入口，以便你在不发布新版本时也能随时打包测试二进制文件。

permissions:
  contents: write # 为什么：赋予 GitHub Actions 写权限，使其能够自动将编译好的文件挂载到仓库的 Release 页面。

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # 为什么：确保某个平台的编译偶发失败时，不会强制中断其他独立平台的编译进度。
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: tcping
            asset_name: tcping-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tcping.exe
            asset_name: tcping-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: tcping
            asset_name: tcping-macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: tcping
            asset_name: tcping-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build target
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          mv ${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload Artifact (For manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Upload Release Asset (For tag pushes)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.asset_name }}